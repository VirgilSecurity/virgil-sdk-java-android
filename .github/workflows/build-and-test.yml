name: Build and Test

on:
  push:
    branches:
      - main
      - master
      - develop
      - dev
      - "release/**"
      - "hotfix/**"
      - "feature/**"
  pull_request:
    branches:
      - main
      - master
      - develop
      - dev
  workflow_dispatch:
  workflow_call:
    secrets:
      ENV_JSON_PASSPHRASE:
        required: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          yes | sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Decrypt env.json for integration tests
        if: hashFiles('env.json.enc') != ''
        env:
          ENV_JSON_PASSPHRASE: ${{ secrets.ENV_JSON_PASSPHRASE }}
        run: |
          if [ -z "${ENV_JSON_PASSPHRASE:-}" ]; then
            echo "ENV_JSON_PASSPHRASE is not set. Integration tests that need env.json will be skipped."
            exit 0
          fi
          ./scripts/decrypt-env.sh

      - name: Build JVM and Android modules
        run: |
          ./gradlew \
            :api:assemble \
            :common:assemble \
            :crypto:assemble \
            :test-common:assemble \
            :sdk:assemble \
            :crypto-android:assembleRelease \
            :android-utils:assembleRelease \
            :sdk-android:assembleRelease \
            --no-daemon \
            --stacktrace

      - name: Run JVM tests
        run: |
          ./gradlew \
            :api:test \
            :common:test \
            :crypto:test \
            :test-common:test \
            :sdk:test \
            --no-daemon \
            --stacktrace

      - name: Cleanup decrypted env.json
        if: always()
        run: rm -f env.json

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-test-reports
          path: |
            **/build/reports/tests/**/*
            **/build/test-results/**/*
          if-no-files-found: warn
